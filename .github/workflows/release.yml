name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to create the Release

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema pyyaml

      - name: Preflight — Ollama pin drift check (WARN-only)
        shell: pwsh
        continue-on-error: true  # see NOTE below
        run: |
          # NOTE on WARN-only: Ollama's GitHub Release assets for a given version
          # tag are mutable — re-uploading a binary with the same v0.5.7 tag
          # changes the SHA without changing the URL. We've observed THREE
          # different SHAs from three downloads of the same URL (local home
          # network, local re-download 10 min later, Azure CI runner). This
          # means SHA pinning against upstream is architecturally unreliable
          # until we mirror the binary to content-addressable storage
          # (Zenodo DOI / IPFS / S3). Tracked in review-findings.md.
          #
          # The CI surfaces the drift as a warning annotation so maintainers
          # can update the pin when it falls behind, but does not BLOCK the
          # release — otherwise every upstream re-release breaks our CI
          # regardless of what we do.
          $pins = Get-Content config/pins.json -Raw | ConvertFrom-Json
          $url = $pins.ollama.url
          $expected = $pins.ollama.sha256
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ollama-pin-check.zip"
          $actual = (Get-FileHash -Algorithm SHA256 "$env:TEMP\ollama-pin-check.zip").Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Host "::warning title=Ollama pin drift::upstream asset changed (expected=$expected actual=$actual). Bundle installs may need a pin refresh."
          } else {
            Write-Host "::notice title=pin ok::Ollama pin matches upstream ($actual)"
          }

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Python unit tests
        run: python -m pytest tests/unit -v

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (Test-Path install/pester.tests.ps1) {
            Invoke-Pester -Path install/pester.tests.ps1 -Output Detailed -CI
          } else {
            Write-Host "::warning title=Pester::install/pester.tests.ps1 not found yet (lands in Tasks 8-11); skipping"
          }

      - name: Assemble bundle layout
        shell: pwsh
        run: |
          $stage = "dist/e156-student-starter-$env:GITHUB_REF_NAME"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item Start.bat $stage
          Copy-Item README.md $stage
          Copy-Item -Recurse ai $stage
          Copy-Item -Recurse bin $stage
          Copy-Item -Recurse config $stage
          Copy-Item -Recurse docs $stage
          Copy-Item -Recurse install $stage
          Copy-Item -Recurse memory $stage
          Copy-Item -Recurse rules $stage
          Copy-Item -Recurse templates $stage
          Copy-Item -Recurse tests $stage
          Copy-Item -Recurse tools $stage

      - name: Compute zip SHA256
        id: shazip
        shell: pwsh
        run: |
          $stage = "dist/e156-student-starter-$env:GITHUB_REF_NAME"
          $zip = "dist/e156-student-starter-$env:GITHUB_REF_NAME.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          $sha = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          # Note: docs/HASH.txt holds the install.ps1 self-SHA gate, NOT the zip SHA.
          # Zip SHA is published separately as a release-notes asset (RELEASE-HASH.txt).
          Set-Content dist/RELEASE-HASH.txt $sha -NoNewline
          "sha=$sha" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "::notice title=Zip SHA256::$sha"

      - name: Verify install.ps1 self-SHA matches docs/HASH.txt
        shell: pwsh
        run: |
          $expected = (Get-Content docs/HASH.txt -Raw).Trim().ToLower()
          $actual = (Get-FileHash -Algorithm SHA256 install/install.ps1).Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Host "::error title=HASH.txt drift::install.ps1 SHA $actual does not match docs/HASH.txt $expected"
            Write-Host "Update docs/HASH.txt with: Get-FileHash -Algorithm SHA256 install/install.ps1"
            exit 1
          }
          Write-Host "::notice title=install.ps1 self-SHA::$actual matches HASH.txt"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/e156-student-starter-*.zip
            dist/RELEASE-HASH.txt
            config/pins.json
            docs/HASH.txt
            review-findings.md
          body: |
            ## Verification

            After downloading, verify with PowerShell:

            ```powershell
            Get-FileHash -Algorithm SHA256 e156-student-starter-${{ github.ref_name }}.zip
            ```

            Expected SHA256: `${{ steps.shazip.outputs.sha }}`

            Cross-check against: https://synthesis-medicine.org/e156-hash.txt

  integration:
    needs: build-and-test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: python -m pip install pytest jsonschema pyyaml
      - name: Install Ollama (portable)
        shell: pwsh
        run: |
          $pins = Get-Content config/pins.json -Raw | ConvertFrom-Json
          Invoke-WebRequest -Uri $pins.ollama.url -OutFile "$env:TEMP\ollama.zip"
          Expand-Archive -Path "$env:TEMP\ollama.zip" -DestinationPath "$env:TEMP\ollama"
          "$env:TEMP\ollama" >> $env:GITHUB_PATH
      - name: Run quick integration tests
        run: python -m pytest tests/integration -m "integration and not slow" -v
