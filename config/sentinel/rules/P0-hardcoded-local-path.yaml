id: P0-hardcoded-local-path
severity: BLOCK
scope: repo
description: >
  Shipped code must not contain absolute local paths like `C:\Users\...` or
  `/home/<user>/...` per lessons.md#code-quality. These leak developer
  environment details and break portability.
pattern: '(?i)([A-Z]:[\\/](Users|projects|ProgramData|OneDrive)[\\/][^\s\"\\/]+|(?:^|(?<=[\s\"''(=:,]))/(?:Users|home)/[a-z_][\w-]*)'
files:
  - '**/*.html'
  - '**/*.js'
  - '**/*.css'
  - '**/*.py'
  - '**/*.json'
  - '**/*.yaml'
  - '**/*.yml'
  - '**/*.md'
  - '**/*.csv'
  - '**/*.tsv'
  - '**/*.txt'
  - '**/*.toml'
  - '**/*.ini'
  - '**/*.cfg'
  - '**/*.R'
  - '**/*.r'
  - '**/*.sh'
  - '**/*.bat'
  - '**/*.ps1'
  - '**/*.ts'
# tests/**, **/tests/**, fixtures/**, **/fixtures/**, conftest.py, and
# **/conftest.py are covered by COMMON_EXCLUDES in sentinel/registry/yaml_loader.py.
#
# wiki/**, data/nightly_reports/**, data/artifacts/**,
# data/real_project_smoke/** exclude auto-generated portfolio content
# (Overmind's wiki cards + nightly reports + per-project smoke checkpoints).
# These legitimately contain absolute paths as DATA describing where each
# project lives — not hardcoded-in-code. Prefer the sentinel:skip-file
# marker for new auto-gen writers; these path excludes cover existing
# tracked files that predate the marker.
exclude:
  - 'sentinel/rules/**'
  - 'docs/superpowers/specs/**'
  - 'docs/superpowers/plans/**'
  # docs/plans/** generalizes the superpowers-namespaced pattern: plan
  # documents typically contain historical `cd C:\Users\...\<repo>\`
  # instructions describing dev-time workflow, not shipped code.
  - 'docs/plans/**'
  - '**/docs/plans/**'
  # truthcert1_work/** — convention for vendored research archives
  # (snapshots imported from sibling projects as reference). Paths in
  # these archives describe the original environment, not the current
  # repo's runtime.
  - 'truthcert1_work/**'
  - '**/truthcert1_work/**'
  # docs/index.html is Sentinel's own dashboard page, which contains
  # demonstration patterns (C:\Users\alice\..., /Users/bob/backup/,
  # /home/alice/logs/) used to illustrate what this rule catches. The
  # demo IS the documentation — excluding it prevents the rule from
  # firing on its own self-test fixture.
  - 'docs/index.html'
  - 'wiki/**'
  - '**/wiki/**'
  - 'data/nightly_reports/**'
  - '**/data/nightly_reports/**'
  - 'data/artifacts/**'
  - '**/data/artifacts/**'
  - 'data/real_project_smoke/**'
  - '**/data/real_project_smoke/**'
  - 'data/baseline_probes/**'
  - '**/data/baseline_probes/**'
fix_hint: >
  Replace absolute paths with relative paths, config-driven roots, or
  environment variables. Use candidate-root discovery for data snapshots.
source: lessons.md#code-quality
