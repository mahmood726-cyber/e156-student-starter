id: P1-unpopulated-placeholder
severity: WARN
scope: repo
description: >
  Unpopulated template placeholders (Jinja braces, REPLACE_ME, TBD markers)
  should not ship in built assets per html-apps.md#safety-checks.
pattern: '\{\{-?\s*[A-Za-z_]\w*\s*(?:(?:\||\[|\.[A-Za-z_])[^}]*)?\s*-?\}\}|REPLACE_ME|__PLACEHOLDER__|TBD:|XXX:'
files:
  - '**/*.html'
  - '**/*.md'
  - '**/*.js'
  - '**/*.py'
# tests/**, **/tests/**, fixtures/**, **/fixtures/**, conftest.py,
# **/conftest.py, and .git/** are covered by GLOBAL_EXCLUDES +
# COMMON_EXCLUDES in sentinel/registry/yaml_loader.py.
exclude:
  - 'docs/superpowers/**'
  - 'templates/**'
  # docs/index.html is Sentinel's own dashboard page, which contains
  # demonstration patterns ({{ user_name }}, REPLACE_ME, TBD:, XXX:,
  # __PLACEHOLDER__) used to illustrate what this rule catches. The
  # demo IS the documentation — excluding it prevents the rule from
  # firing on its own self-test fixture.
  - 'docs/index.html'
fix_hint: >
  Populate the placeholder or escape it before shipping. If the braces are
  intentional template syntax in a non-template file, exclude the file path
  via the rule's exclude list.
source: html-apps.md#safety-checks
